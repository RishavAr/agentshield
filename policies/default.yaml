version: 1
default_mode: shadow

rules:
  - name: block_external_analytics_email
    tool: send_email
    condition:
      field: arguments.to
      operator: contains
      value: "@external-analytics.com"
    action: block
    risk_score: 0.95

  - name: block_known_hacker_email
    tool: send_email
    condition:
      field: arguments.to
      operator: contains
      value: "hacker@evil.com"
    action: block
    risk_score: 0.95

  - name: block_known_attacker_email
    tool: send_email
    condition:
      field: arguments.to
      operator: contains
      value: "attacker@evil.com"
    action: block
    risk_score: 0.95

  - name: block_personal_email_domains
    tool: send_email
    condition:
      field: arguments.to
      operator: contains
      value: "@gmail.com"
    action: block
    risk_score: 0.9

  - name: block_external_email
    tool: send_email
    condition:
      field: arguments.to
      operator: not_contains
      value: "@yourcompany.com"
    action: block
    risk_score: 0.9

  - name: block_destructive_sql_drop
    tool: update_database
    condition:
      field: arguments.query
      operator: contains
      value: "DROP "
    action: block
    risk_score: 0.95

  - name: block_destructive_sql_delete
    tool: update_database
    condition:
      field: arguments.query
      operator: contains
      value: "DELETE FROM"
    action: block
    risk_score: 0.9

  - name: block_shell_chmod_dangerous
    tool: run_shell_command
    condition:
      field: arguments.command
      operator: contains
      value: "chmod 777"
    action: block
    risk_score: 0.95

  - name: block_shell_useradd
    tool: run_shell_command
    condition:
      field: arguments.command
      operator: contains
      value: "useradd"
    action: block
    risk_score: 0.95

  - name: block_shell_rm_rf
    tool: run_shell_command
    condition:
      field: arguments.command
      operator: contains
      value: "rm -rf"
    action: block
    risk_score: 0.95

  - name: block_slack_secrets
    tool: send_slack_message
    condition:
      field: arguments.message
      operator: contains
      value: "AWS_SECRET_KEY"
    action: block
    risk_score: 0.9

  - name: block_offshore_transfer_sql
    tool: update_database
    condition:
      field: arguments.query
      operator: contains
      value: "offshore_account"
    action: block
    risk_score: 0.95

  - name: block_phi_medical_select
    tool: update_database
    condition:
      field: arguments.query
      operator: contains
      value: "diagnosis"
    action: block
    risk_score: 0.9
