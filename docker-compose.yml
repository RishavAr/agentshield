version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      AGENTIVA_DATABASE_URL: ${AGENTIVA_DATABASE_URL:-sqlite+aiosqlite:///./agentiva.db}
      AGENTIVA_POLICY_PATH: ${AGENTIVA_POLICY_PATH:-policies/default.yaml}
      AGENTIVA_MODE: ${AGENTIVA_MODE:-shadow}
      AGENTIVA_RATE_LIMIT_PER_MINUTE: ${AGENTIVA_RATE_LIMIT_PER_MINUTE:-100}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AGENTIVA_HOST: ${AGENTIVA_HOST:-0.0.0.0}
      AGENTIVA_PORT: ${AGENTIVA_PORT:-8000}
    ports:
      - "${AGENTIVA_PORT:-8000}:8000"
    volumes:
      - ./:/app
      - agentiva_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentiva}
      POSTGRES_USER: ${POSTGRES_USER:-agentiva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentiva}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentiva} -d ${POSTGRES_DB:-agentiva}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agentiva_data:
  redis_data:
  postgres_data:
